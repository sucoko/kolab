<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1">

<title>KOLAB - Tahapan Projek</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="card">

<h2>📋 Tahapan Projek</h2>

<label>Tema Projek</label>

<select id="theme">

<option value="">Memuat Tema...</option>

</select>

<br><br>

<button id="btnAI"
        onclick="generateTahapanAI()">

🤖 Generate Tahapan AI

</button>

<div id="aiResult"
style="
margin-top:15px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
min-height:40px;
">

Belum ada usulan AI.

</div>

<hr>

<label>Urutan</label>

<input
type="number"
id="urutan"
min="1">

<label>Nama Tahap</label>

<input
type="text"
id="namaTahap">

<label>Deskripsi Tahap</label>

<textarea
id="deskripsiTahap"></textarea>

<label>Minggu Mulai</label>

<input
type="number"
id="mingguMulai"
min="1">

<label>Minggu Selesai</label>

<input
type="number"
id="mingguSelesai"
min="1">

<button
id="btnSimpanTahap"
onclick="simpanTahap()">

💾 Simpan Tahapan

</button>

<div id="status"></div>

</div>

<br>

<div class="card">

<h3>📅 Timeline Projek</h3>

<div id="stageContainer">

Memuat data...

</div>

</div>

<script src="js/api.js"></script>
<script src="js/stages.js"></script>

</body>

</html>
