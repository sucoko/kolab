<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KOLAB - Input Tema Projek</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>📚 Input Tema Projek</h1>

        <label for="kompetensi">
            Konsentrasi Keahlian
        </label>

        <select id="kompetensi">
            <option value="">Memuat data...</option>
        </select>

        <label for="tema">
            Tema Projek
        </label>

        <input
            type="text"
            id="tema"
            placeholder="Masukkan tema projek">

        <label for="deskripsi">
            Deskripsi Tema
        </label>

        <textarea
            id="deskripsi"
            placeholder="Tuliskan deskripsi tema projek"></textarea>

        <label for="durasi">
            Durasi (Minggu)
        </label>

        <input
            type="number"
            id="durasi"
            min="1"
            placeholder="Contoh : 16">

        <button
            id="btnSimpan"
            onclick="simpanTema()">

            💾 Simpan Tema

        </button>

        <div id="status"></div>

    </div>

    <br>

    <div class="container">

        <h2>Daftar Tema Projek</h2>

        <div id="themeList">

            <p>Memuat data...</p>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/themes.js"></script>

</body>

</html>
